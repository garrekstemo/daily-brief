[settings]
volume_target   = 24      # soft cap on MAIN-column items on the rolling page
sidebar_target  = 18      # soft cap on sidebar items on the rolling page
min_main_score  = 0.6     # relevance >= this -> main column, else sidebar
recency_hours   = 48      # how fresh an item must be to be picked up as NEW
display_window_days = 7   # how long an item stays on the page after it first appears
dedup_window_days = 14    # also dedup against this many days of prior editions

# Strong-match topics -> main column. id is used for routing + jump anchors.
[[topic]]
id = "progress-econ"
label = "Progress & economy"
hint  = "progress studies, economic growth, abundance, deregulation, political economy"
[[topic]]
id = "science-ai"
label = "Science & AI"
hint  = "metascience, reproducibility, AI in science, the practice of science"
[[topic]]
id = "demographics"
label = "Demographics"
hint  = "population decline, fertility, demographics and growth"
[[topic]]
id = "geopolitics"
label = "Geopolitics of science"
hint  = "China science/tech, research competition, trade and industrial policy"

# Broad curiosities -> feed the sidebar's interesting-but-off-topic picks.
curiosities = [
  "the culture and institutions of science",
  "technology and society essays",
]

# Regular sources: included if relevant, but NOT treated as novel finds.
regulars = [
  "ft.com","economist.com","theatlantic.com","nytimes.com",
  "newyorker.com","foreignaffairs.com","nature.com","scientificamerican.com",
]

# Sources to actively sweep beyond the regulars (the serendipity engine).
# feed = "" means "no working RSS — reach via topical search only".
# Every non-empty feed below returned HTTP 200 + XML when this file was written.
[[watchlist]]
name = "Works in Progress"
feed = "https://worksinprogress.co/rss.xml"
[[watchlist]]
name = "Construction Physics"
feed = "https://www.construction-physics.com/feed"
[[watchlist]]
name = "Statecraft"
feed = "https://www.statecraft.pub/feed"
[[watchlist]]
name = "Marginal Revolution"
feed = "https://marginalrevolution.com/feed"
[[watchlist]]
name = "Slow Boring"
feed = "https://www.slowboring.com/feed"
[[watchlist]]
name = "Astral Codex Ten"
feed = "https://www.astralcodexten.com/feed"
[[watchlist]]
name = "Noahpinion"
feed = "https://www.noahpinion.blog/feed"
[[watchlist]]
name = "Quanta Magazine"
feed = "https://api.quantamagazine.org/feed/"
[[watchlist]]
name = "Nautilus"
feed = "https://nautil.us/feed/"
[[watchlist]]
name = "The New Atlantis"
feed = "https://www.thenewatlantis.com/feed"
[[watchlist]]
name = "Asterisk Magazine"
feed = ""
[[watchlist]]
name = "Harvard Crimson"
feed = ""

